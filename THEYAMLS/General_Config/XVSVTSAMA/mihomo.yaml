proxies: ~
proxy-groups:
  - name: 🌍 PROXY
    icon: "https://github.com/DustinWin/ruleset_geodata/releases/download/icons/proxy.png"
    type: select
    proxies:
        - 👉 手动切换
        - ♻️ 自动选择
        - 🔄 负载均衡
        - 📲 Telegram
        - 🤖 AI大模型
        - DIRECT
  - name: 🔄 负载均衡
    icon: "https://www.clashverge.dev/assets/icons/balance.svg"
    type: load-balance
    proxies:
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    lazy: true
    strategy: sticky-sessions
  - name: 👉 手动切换
    icon: "https://github.com/DustinWin/ruleset_geodata/releases/download/icons/select.png"
    type: select
  - name: ♻️ 自动选择
    icon: "https://github.com/DustinWin/ruleset_geodata/releases/download/icons/auto.png"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    
  - name: 📲 Telegram
    icon: "https://github.com/DustinWin/ruleset_geodata/releases/download/icons/telegram.png"
    type: select
  - name: 🎮 Games-Global
    icon: "https://github.com/DustinWin/ruleset_geodata/releases/download/icons/games-cn.png"
    type: select

  - name: ✖️ Twitter
    icon: "https://www.clashverge.dev/assets/icons/twitter.svg"
    type: select
    filter: "美国|住宅"
    include-all-proxies: true
  - name: 🤖 AI大模型
    icon: "https://github.com/DustinWin/ruleset_geodata/releases/download/icons/ai.png"
    type: select
    filter: "美国|住宅"
    include-all-proxies: true
  - name: 🎵 TikTok
    icon: "https://github.com/DustinWin/ruleset_geodata/releases/download/icons/tiktok.png"
    type: select
    filter: "美国|住宅"
    include-all-proxies: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP: {ports: [80, 8080-8880]}
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
  force-domain:
    - '+.v2ex.com'
  skip-domain:
    - 'Mijia Cloud'
    - 'dlg.io.mi.com'
    - '+.apple.com'
    - '+.icloud.com'
    - '+.wechat.com'
    - '+.qpic.cn'
    - '+.qq.com'
    - '+.wechatapp.com'
    - '+.vivox.com'
    - '+.oray.com'
    - '+.sunlogin.net'
  skip-dst-address:
    - 'rule-set:telegramcidr'
    - 'rule-set:lancidr'
    - 'rule-set:cncidr'

dns:
  enable: true                                             
 #prefer-h3: true                                             
  ipv6: true                                       
  listen: '0.0.0.0:1053'  
 #listen: '0.0.0.0:53'                               
  use-hosts: true                                            
  use-system-hosts: false                                            
  default-nameserver:     
    - tls://223.5.5.5#DIRECT
    - tls://223.6.6.6#DIRECT
  proxy-server-nameserver: 
    - https://hrbgyitz34.cloudflare-gateway.com/dns-query#DIRECT
  direct-nameserver: 
    - https://dns.alidns.com/dns-query#DIRECT
    - https://doh.pub/dns-query#DIRECT
  direct-nameserver-follow-policy: true
  nameserver:
    - https://cloudflare-dns.com/dns-query#👉 手动切换
  # - https://dns.adguard-dns.com/dns-query     # AdGuard          # 94.140.14.14        94.140.15.15
  # - https://dns.google/dns-query             # Google DNS       # 8.8.8.8             8.8.4.4
  # - https://dns.quad9.net/dns-query           # IBM Quad9        # 9.9.9.11            149.112.112.11     
  # - https://doh.opendns.com/dns-query         # OpenDNS          # 208.67.220.220      208.67.222.222
  # - https://doh.dns.sb/dns-query              # DNS.SB           # 185.222.222.222     45.11.45.11
  # - https://dns.twnic.tw/dns-query            # Quad101          # 101.101.101.10      101.102.103.10
  prefer-h3: false
  respect-rules: false                                            
  enhanced-mode: fake-ip                  
  fake-ip-range: '198.18.0.1/16'
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: blacklist                    
  fake-ip-filter: 
    - rule-set:fakeip-filter_domain
    - rule-set:private
    - rule-set:pixiv
    - pixshaft.com
  nameserver-policy: 
    'rule-set:private,direct,proxy@direct': https://dns.alidns.com/dns-query#DIRECT

