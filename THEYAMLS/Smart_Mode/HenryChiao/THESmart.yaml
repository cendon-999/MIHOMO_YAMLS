#####################################
# 终极融合版 TheFullSmart
# 基础配置: 用户自定义版 v260215
# 融合来源: echs-top/proxy (2026-04-29, smart版+通用版)
# 融合日期: 2026-04-30
# 融合内容: Smart sticky-sessions、lgbm自动更新、增强TUN、
#           IPv4/v6直连节点、UDP精细分流(代理UDP组)、
#           加拿大/德国/法国/荷兰地区、
#           TRACKER/人机验证策略组、captcha/fcm/trackerslist规则集、
#           prefer-h3、strict-route、sniffer增强跳过、
#           proxy-dns锚点、direct-nameserver-follow-policy、
#           fallback故障转移锚点（地区策略组可在Smart/Fallback间切换）、
#           SUB-RULE子规则体系、代理QUIC组、FCM独立策略组、google-cn规则集、
#           DNS三锚点分层(direct-dns纯IP/direct-doh/proxy-doh)
#####################################

# ==================== 锚点配置 ====================
# 代理提供者模板
BaseProvider: &BaseProvider
  type: http
  interval: 86400
  proxy: DIRECT
  health-check:
    enable: true
    url: 'https://www.google.com/generate_204'
    interval: 300
  filter: '^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'

# 策略组类型模板
BaseFB:    &BaseFB    {type: fallback,      interval: 200, lazy: true,  url: 'https://www.google.com/generate_204'}
BaseCH:    &BaseCH    {type: load-balance,  interval: 200, lazy: true,  url: 'https://www.google.com/generate_204', strategy: consistent-hashing, hidden: true}
BaseCR:    &BaseCR    {type: load-balance,  interval: 200, lazy: true,  url: 'https://www.google.com/generate_204', strategy: round-robin,          hidden: true}
BaseUT:    &BaseUT    {type: url-test,      interval: 200, lazy: true,  url: 'https://www.google.com/generate_204', hidden: true}
# Smart策略模板：融合 sticky-sessions 保证会话粘性，collectdata 在稳定后可开启
BaseSmart: &BaseSmart {type: smart, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', hidden: true, uselightgbm: true, strategy: sticky-sessions, collectdata: false, sample-rate: 1}
# 通用版故障转移模板（不依赖LightGBM，适合标准内核或 Smart 暂不可用时）
BaseFall:  &BaseFall  {type: fallback, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', hidden: true}

# 节点筛选正则
FilterHK: &FilterHK '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(排除1|排除2|5x)).*$'
FilterSG: &FilterSG '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP|新加坡|狮城))(?!.*(排除1|排除2|5x)).*$'
