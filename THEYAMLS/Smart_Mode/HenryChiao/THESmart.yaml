# 嗅探
sniffer:
  enable: true
  force-dns-mapping: true      # 强制 fakeip 域名映射嗅探
  parse-pure-ip: true          # 纯 IP 连接也嗅探
  override-destination: false  # 保持第二份保守值，避免重写目标
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "rule-set:Private"       # 跳过私有域名嗅探
  skip-src-address:
    - "rule-set:PrivateIP"     # 跳过私有IP来源
  skip-dst-address:
    - "rule-set:PrivateIP"

# 入站
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  # 使用 nikki 时取消注释下面一行，并将 auto-route 等改为 false
  # device: nikki
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false
  # 以下为融合第二份增强参数（纯内核模式下开启，nikki 模式不需要）
  # strict-route: true
  # disable-icmp-forwarding: true

# ==================== DNS配置 ====================
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: true                           # DNS 解析支持 IPv6
  prefer-h3: true                      # 优先使用 HTTP/3 加速 DoH
  use-hosts: true
  use-system-hosts: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-range6: fd00:bada:55ed::1/64 # IPv6 FakeIP 范围
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver: *direct-doh
  direct-nameserver: *direct-doh
  direct-nameserver-follow-policy: true  # 直连 DNS 也遵循 nameserver-policy
  nameserver: *proxy-doh
  nameserver-policy:
    "rule-set:Tracking,Advertising":
      - rcode://success
    # private用纯IP DNS：最快，无握手延迟
    "rule-set:Private":           *direct-dns
    # FCM/captcha 用直连DoH：加密但走直连（captcha 04-29改为直连DoH解析）
    "rule-set:FCM":               *direct-doh
    "rule-set:Captcha":           *direct-doh
    # 直连域名用直连DoH
    "rule-set:LocationDKS,Direct,XPTV,Download,AppleCN,MicrosoftCN,GamesCN,GoogleCN":
      *direct-doh
    # CN域名用纯IP DNS：最快
    "rule-set:China":             *direct-dns
    # 代理域名用代理DoH
    "rule-set:Github,AI,Speedtest,Twitter,Telegram,SocialMedia,NewsMedia,Games,Crypto,Emby,Netflix,YouTube,Streaming,Apple,Google,Microsoft,Proxy":
      *proxy-doh
    "domain-keyword:speedtest": *proxy-doh
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,fakeip-filter,real-ip
    - DOMAIN,mimimi.com,real-ip
    - RULE-SET,LocationDKS,real-ip
    - RULE-SET,Private,real-ip
    - RULE-SET,FCM,real-ip
    - RULE-SET,Direct,real-ip
    - RULE-SET,XPTV,real-ip
    - RULE-SET,Download,real-ip
    - RULE-SET,AppleCN,real-ip
    - RULE-SET,AI,fake-ip
    - RULE-SET,Captcha,fake-ip           # 人机验证走 fakeip
    - DOMAIN-KEYWORD,speedtest,fake-ip
    - RULE-SET,Speedtest,fake-ip
    - RULE-SET,Twitter,fake-ip
    - RULE-SET,Telegram,fake-ip
    - RULE-SET,SocialMedia,fake-ip
    - RULE-SET,NewsMedia,fake-ip
    - RULE-SET,Games,fake-ip
    - RULE-SET,Crypto,fake-ip
    - RULE-SET,Emby,fake-ip
    - RULE-SET,Netflix,fake-ip
    - RULE-SET,YouTube,fake-ip
    - RULE-SET,Streaming,fake-ip
    - RULE-SET,Apple,fake-ip
    - RULE-SET,Google,fake-ip
    - RULE-SET,Microsoft,fake-ip
    - RULE-SET,Proxy,fake-ip
    - RULE-SET,China,real-ip
    - MATCH,real-ip

# ==================== 静态代理节点 ====================
# 直连控制节点：IP版本精细化控制（UDP流量控制已由"代理UDP"策略组接管）
proxies:
  - {name: IPV4优先, type: direct, udp: true,  ip-version: ipv4-prefer}
  - {name: IPV6优先, type: direct, udp: true,  ip-version: ipv6-prefer}
  - {name: 仅IPV4,   type: direct, udp: true,  ip-version: ipv4}
  - {name: 仅IPV6,   type: direct, udp: true,  ip-version: ipv6}

# ==================== 策略组 ====================
proxy-groups:
  # ==================== 主要策略组 ====================
  - {name: 默认代理,   <<: *SelectFB, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Static.png}
  - {name: 故障转移,   <<: *BaseFB, proxies: [香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 加拿大策略, 德国策略, 全球手动, 冷门自选, 直接连接], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/ULB.png}
  - {name: 国外流量,   <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Global.png}
  - {name: 代理QUIC,   type: select, proxies: [PASS, REJECT], icon: https://mihomo.echs.top/img/icon/Forbidden.webp}  # QUIC(UDP 443)行为：PASS=允许，REJECT=阻断
