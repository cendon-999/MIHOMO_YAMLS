# ==================== 路由规则 ====================
rules:
  # ======== 端口特化 ========
  - SUB-RULE,(DST-PORT,5228-5230),fcm_rules          # FCM推送端口 → FCM子规则（UDP REJECT，TCP直连）
  - DST-PORT,1337/2710/6881-6999/7777,下载追踪        # BT/PT Tracker 端口 → 下载追踪组

  # ======== 基础拦截 ========
  - RULE-SET,PrivateIP,直接连接,no-resolve
  - RULE-SET,Private,直接连接
  - RULE-SET,Tracking,REJECT
  - RULE-SET,Advertising,REJECT

  # ======== 直连优先 ========
  - SUB-RULE,(RULE-SET,FCM),fcm_rules                 # FCM域名 → FCM子规则
  - RULE-SET,LocationDKS,抖快书定位
  - RULE-SET,Direct,直接连接
  - RULE-SET,XPTV,直接连接
  - RULE-SET,Download,直接连接
  - RULE-SET,AppleCN,直接连接
  - RULE-SET,MicrosoftCN,直接连接
  - RULE-SET,GamesCN,直接连接
  - RULE-SET,GoogleCN,直接连接                        # 新增：Google中国域名直连

  # ======== 服务分流（SUB-RULE：先判断QUIC再目标策略）========
  - SUB-RULE,(RULE-SET,Captcha),captcha_rules
  - SUB-RULE,(RULE-SET,AI),ai_rules
  - DOMAIN-KEYWORD,speedtest,网络测试
  - RULE-SET,Speedtest,网络测试
  - SUB-RULE,(RULE-SET,Github),proxy_rules
  - SUB-RULE,(RULE-SET,Twitter),proxy_rules
  - SUB-RULE,(RULE-SET,Telegram),telegram_rules
  - SUB-RULE,(RULE-SET,SocialMedia),proxy_rules
  - SUB-RULE,(RULE-SET,NewsMedia),proxy_rules
  - SUB-RULE,(RULE-SET,Games),proxy_rules
  - SUB-RULE,(RULE-SET,Crypto),proxy_rules
  - SUB-RULE,(RULE-SET,Emby),media_rules
  - SUB-RULE,(RULE-SET,Netflix),media_rules
  - SUB-RULE,(RULE-SET,YouTube),media_rules
  - SUB-RULE,(RULE-SET,Streaming),media_rules
  - SUB-RULE,(RULE-SET,Apple),proxy_rules
  - SUB-RULE,(RULE-SET,Google),google_rules
  - SUB-RULE,(RULE-SET,Microsoft),proxy_rules
  - SUB-RULE,(RULE-SET,Trackerslist),trackerslist_rules
  - SUB-RULE,(RULE-SET,Proxy),proxy_rules
  - RULE-SET,China,国内流量

  # ======== IP规则（SUB-RULE提升精度）========
  - RULE-SET,AdvertisingIP,REJECT,no-resolve
  - RULE-SET,XPTVIP,直接连接,no-resolve
  - SUB-RULE,(RULE-SET,AIIP),ai_rules
  - SUB-RULE,(RULE-SET,TelegramIP),telegram_rules
  - SUB-RULE,(RULE-SET,SocialMediaIP),proxy_rules
  - SUB-RULE,(RULE-SET,EmbyIP),media_rules
  - SUB-RULE,(RULE-SET,NetflixIP),media_rules
  - SUB-RULE,(RULE-SET,StreamingIP),media_rules
  - SUB-RULE,(RULE-SET,GoogleIP),google_rules
  - SUB-RULE,(RULE-SET,ProxyIP),proxy_rules
  - RULE-SET,ChinaIP,国内流量

  # ======== QUIC兜底 & 最终 ========
  - AND,((NETWORK,UDP),(DST-PORT,443)),代理QUIC        # 未被子规则捕获的 UDP 443 统一到代理QUIC控制组
  # - DST-PORT,10000-65535,下载追踪                   # 激进BT兜底，按需开启
  - MATCH,兜底流量

# ==================== SUB-RULES 子规则集 ====================
# 每个服务：UDP 443(QUIC) → 代理QUIC控制组；其余 → 目标策略组
# FCM特例：UDP全部REJECT（推送服务不需要QUIC），TCP直连
sub-rules:
  fcm_rules:
    - NETWORK,UDP,REJECT                              # FCM UDP 全拒（避免推送走QUIC导致失败）
    - MATCH,FCM服务                                   # FCM TCP → FCM服务策略组（可直连可代理）

  captcha_rules:
    - AND,((NETWORK,UDP),(DST-PORT,443)),代理QUIC
    - MATCH,人机验证

  ai_rules:
    - AND,((NETWORK,UDP),(DST-PORT,443)),代理QUIC
    - MATCH,人工智能

  telegram_rules:
    - AND,((NETWORK,UDP),(DST-PORT,443)),代理QUIC
    - MATCH,电报消息

  media_rules:
    - AND,((NETWORK,UDP),(DST-PORT,443)),代理QUIC
    - MATCH,国际媒体                                  # Emby/Netflix/YouTube/Streaming 统一走国际媒体组

  google_rules:
    - AND,((NETWORK,UDP),(DST-PORT,443)),代理QUIC
    - MATCH,谷歌服务

  trackerslist_rules:
    - AND,((NETWORK,UDP),(DST-PORT,443)),代理QUIC
    - MATCH,下载追踪

  proxy_rules:
    - AND,((NETWORK,UDP),(DST-PORT,443)),代理QUIC
    - MATCH,国外流量                                  # 通用代理兜底子规则


