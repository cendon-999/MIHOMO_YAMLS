FilterUK: &FilterUK '^(?=.*(?i)(英|英国|UK|GB|大不列颠|Kingdom|unitedkingdom))(?!.*(排除1|排除2|5x)).*$'
FilterCA: &FilterCA '^(?=.*(?i)(加拿大|🇨🇦|CA|Canada))(?!.*(排除1|排除2|5x)).*$'
