SelectHK: &SelectHK {type: select, proxies: [香港策略, 默认代理, 故障转移, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动, 直接连接]}
SelectSG: &SelectSG {type: select, proxies: [狮城策略, 默认代理, 故障转移, 香港策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动, 直接连接]}
SelectUS: &SelectUS {type: select, proxies: [美国策略, 默认代理, 故障转移, 香港策略, 狮城策略, 日本策略, 韩国策略, 台湾策略, 欧盟策略, 加拿大策略, 冷门自选, 全球手动, 直接连接]}

# DNS锚点
# DNS三锚点分层（04-29优化）：
# direct-dns: 纯IP UDP/TCP，用于 cn/private 等延迟敏感场景，无需DoH握手
# direct-doh: 直连DoH，用于需要加密但走直连的域名（FCM/captcha/apple-cn等）
# proxy-doh:  代理DoH，用于代理域名的DNS解析
direct-dns:  &direct-dns  [119.29.29.29, 223.5.5.5, '2402:4e00::', '2400:3200::1']
direct-doh:  &direct-doh  ['https://dns.alidns.com/dns-query#直接连接', 'https://doh.pub/dns-query#直接连接&h3=false']
proxy-doh:   &proxy-doh   ['https://dns.google/dns-query#代理DNS', 'https://dns.quad9.net/dns-query#代理DNS']

# ==================== 代理提供者 ====================
proxy-providers:
  优质服务商: {<<: *BaseProvider, url: '优质订阅源地址', override: {additional-prefix: '[优] '}}
  备用服务商: {<<: *BaseProvider, url: '备用订阅源地址', override: {additional-prefix: '[备] '}}

# ==================== 监听器 ====================
listeners:
  - {name: SS-IN,       type: shadowsocks, listen: '::', port: 10010, udp: true, password: password, cipher: aes-256-gcm}
  - {name: MIXED-FB,    type: mixed, port: 49999, proxy: 故障转移}
  - {name: MIXED-HK,    type: mixed, port: 50000, proxy: 香港策略}
  - {name: MIXED-SG,    type: mixed, port: 50001, proxy: 狮城策略}
  - {name: MIXED-JP,    type: mixed, port: 50002, proxy: 日本策略}
  - {name: MIXED-TW,    type: mixed, port: 50003, proxy: 台湾策略}
  - {name: MIXED-US,    type: mixed, port: 50004, proxy: 美国策略}
  - {name: MIXED-KR,    type: mixed, port: 50005, proxy: 韩国策略}
  - {name: MIXED-DIRECT,type: mixed, port: 10086, proxy: 直接连接}

# ==================== 核心配置 ====================
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: warning
bind-address: '*'
find-process-mode: strict
global-ua: mihomo
keep-alive-interval: 15        # 融合第二份更保守的心跳间隔
keep-alive-idle: 600
etag-support: true
disable-keep-alive: false

# LightGBM 模型自动更新（vernesong/mihomo smart分支特性）
lgbm-auto-update: true
lgbm-update-interval: 72
lgbm-url: 'https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-large.bin'

# 认证配置
authentication:
  - mihomo:yyds666
skip-auth-prefixes:
  - 192.168.1.0/24
  - 192.168.31.0/24
  - 192.168.100.0/24
  - 127.0.0.1/8

# 管理面板
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 0.0.0.0:9090
secret: password

# GEO数据
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 48
geox-url:
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb:    "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb"
  geoip:   "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  asn:     "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# 配置存储
profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100    # 融合第二份，收集更多样本供 LightGBM 训练

# Hosts配置
